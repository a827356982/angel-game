<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>李璐飞跃荆棘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Arial',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;touch-action:none}
#gameContainer{position:relative;width:100vw;height:100vh;max-width:500px;background:linear-gradient(to bottom,#87CEEB 0%,#E0F6FF 100%);overflow:hidden;box-shadow:0 10px 50px rgba(0,0,0,0.3)}
#gameCanvas{display:block;width:100%;height:100%;cursor:pointer}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#avatarSection{position:absolute;top:20px;right:20px;text-align:center;background:rgba(255,255,255,0.9);padding:10px 15px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.2)}
#avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;margin:0 auto 5px;border:3px solid #fff}
#encouragement{font-size:14px;color:#667eea;font-weight:bold}
#score{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:48px;font-weight:bold;color:#fff;text-shadow:2px 2px 4px rgba(0,0,0,0.5);z-index:10}
#loveCounter{position:absolute;top:20px;left:20px;background:rgba(255,105,180,0.9);padding:8px 12px;border-radius:15px;font-weight:bold;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:10;display:flex;align-items:center;gap:5px;font-size:14px}
#kissCounter{position:absolute;top:75px;left:20px;background:rgba(255,20,147,0.9);padding:8px 12px;border-radius:15px;font-weight:bold;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:10;display:flex;align-items:center;gap:5px;font-size:14px}
#loveCounterLabel{font-size:11px;color:#fff;margin-left:3px;text-shadow:1px 1px 2px rgba(0,0,0,0.3)}
#kissCounterLabel{font-size:11px;color:#fff;margin-left:3px;text-shadow:1px 1px 2px rgba(0,0,0,0.3)}
#timedMessage{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:rgba(255,215,0,0.95);padding:15px 30px;border-radius:20px;font-size:24px;font-weight:bold;color:#ff1493;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:95;display:none;text-align:center}
#kissMessage{position:absolute;top:160px;left:50%;transform:translateX(-50%);background:rgba(255,105,180,0.95);padding:15px 30px;border-radius:20px;font-size:24px;font-weight:bold;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:96;display:none;text-align:center}
#gameOver{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,0.95);padding:30px 40px;border-radius:20px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.3);display:none;z-index:100}
#gameOver h2{color:#764ba2;margin-bottom:20px;font-size:28px}
#gameOver p{margin:10px 0;font-size:18px;color:#333}
#restartBtn{margin-top:20px;padding:12px 30px;font-size:18px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:25px;cursor:pointer;pointer-events:auto;transition:transform 0.2s}
#restartBtn:hover{transform:scale(1.05)}
#startScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:200}
#startScreen h1{color:#fff;font-size:36px;margin-bottom:20px;text-shadow:2px 2px 4px rgba(0,0,0,0.5)}
#startScreen p{color:#fff;font-size:18px;margin-bottom:30px}
#countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120px;font-weight:bold;color:#FFD700;text-shadow:4px 4px 8px rgba(0,0,0,0.7);display:none;z-index:150;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}
#startBtn{padding:15px 40px;font-size:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:30px;cursor:pointer;transition:transform 0.2s}
#startBtn:hover{transform:scale(1.05)}
</style>
</head>
<body>
<div id="gameContainer">
<canvas id="gameCanvas"></canvas>
<div id="ui">
<div id="loveCounter"><span style="font-size:20px;line-height:1;">❤️</span><span id="loveCounterSpan" style="font-size:20px;font-weight:bold;">0</span><div id="loveCounterLabel">收到支的爱心数</div></div>
<div id="kissCounter"><div id="kissIcon" style="font-size:20px;line-height:1;">💋</div><span id="kissCounterSpan" style="font-size:20px;font-weight:bold;">0</span><div id="kissCounterLabel">被支亲到的次数</div></div>
<div id="score">0秒</div>
<div id="timedMessage"></div>
<div id="kissMessage"></div>
<div id="avatarSection"><img id="avatar" src="avatar-image.png" alt="avatar"><div id="encouragement">加油！李璐</div></div>
</div>
<div id="countdown">3</div>
<div id="startScreen"><h1>🌟 李璐飞跃荆棘 🌟</h1><p>点击屏幕让美少女飞跃荆棘</p><button id="startBtn">开始飞跃</button></div>
<div id="gameOver"><h2>美女请重新来过！</h2><p id="finalTime">坚持惹：0秒</p><p id="bestTime">最高成绩：0秒</p><button id="restartBtn">美女重生</button></div>
</div>
<script>
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
var gameContainer = document.getElementById('gameContainer');
var scoreEl = document.getElementById('score');
var gameOverEl = document.getElementById('gameOver');
var finalTimeEl = document.getElementById('finalTime');
var bestTimeEl = document.getElementById('bestTime');
var restartBtn = document.getElementById('restartBtn');
var startScreen = document.getElementById('startScreen');
var startBtn = document.getElementById('startBtn');
var countdownEl = document.getElementById('countdown');
var timedMsgEl = document.getElementById('timedMessage');
var kissMsgEl = document.getElementById('kissMessage');
var loveCounterSpan = document.getElementById('loveCounterSpan');
var kissCounterSpan = document.getElementById('kissCounterSpan');

var angelImg = new Image();
angelImg.src = 'angel-image.jpg';
var avatarImg = new Image();
avatarImg.src = 'avatar-image.png';
var kissImg = new Image();
kissImg.src = 'kiss-image.png?v=2';

// ===== 音效系统 (Web Audio API) =====
var audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playJumpSound() {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.15);
}

function playLoveSound() {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
    osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
    osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.3);
}

function playKissSound() {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.08);
    osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.2);
}

function playHitSound() {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.4);
}

function playMessageSound() {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.2);
}

function resizeCanvas() { canvas.width = gameContainer.clientWidth; canvas.height = gameContainer.clientHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

var gameState = 'waiting';
var startTime = 0;
var bestTime = localStorage.getItem('angelBestTime') || 0;
var loveCount = 0;
var kissCount = 0;

var TIMED_MESSAGES = [
    { time: 10000, text: '李璐你真棒！！！' },
    { time: 20000, text: '哇哇哇你怎么这么厉害！' },
    { time: 30000, text: '你这个女人！居然可以坚持30S！' },
    { time: 40000, text: '居然能到这一步！你果然是最棒的宝宝！' },
    { time: 52000, text: '52.0快乐！' },
    { time: 60000, text: '此女已无敌' },
    { time: 70000, text: '美女你也太厉害啦！' },
    { time: 80000, text: '你真的是超人' },
    { time: 90000, text: '游戏小天才李璐是也！' },
    { time: 100000, text: '21世纪美少女转生' },
    { time: 110000, text: '李璐大王！！！' },
    { time: 120000, text: '吉尼斯世界纪录已经攻破！' }
];
var shownMessages = [];
function resetShownMessages() { shownMessages = TIMED_MESSAGES.map(function() { return false; }); }
resetShownMessages();

function showTimedMessage(text) {
    timedMsgEl.textContent = text;
    timedMsgEl.style.display = 'block';
    if (timedMsgEl._hideTimer) clearTimeout(timedMsgEl._hideTimer);
    timedMsgEl._hideTimer = setTimeout(function() { timedMsgEl.style.display = 'none'; timedMsgEl._hideTimer = null; }, 3000);
}

function showKissMessage(text) {
    kissMsgEl.textContent = text;
    kissMsgEl.style.display = 'block';
    if (kissMsgEl._hideTimer) clearTimeout(kissMsgEl._hideTimer);
    kissMsgEl._hideTimer = setTimeout(function() { kissMsgEl.style.display = 'none'; kissMsgEl._hideTimer = null; }, 3000);
}

var angel = { x: 100, y: 0, width: 40, height: 40, velocity: 0, gravity: 0.1, jump: -4 };
var thorns = [];
var thornSpeed = 1.2;
var thornInterval = 1600;
var lastThornTime = 0;
var loveItems = [];
var kissItems = [];
var loveHearts = [];
var loveEffectActive = false;

function drawAngel() {
    ctx.save();
    ctx.translate(angel.x, angel.y);
    var w = angel.width * 1.5;
    var h = angel.height * 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, w / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(angelImg, -w / 2, -h / 2, w, h);
    ctx.restore();
}

function drawLoveItem(item) {
    ctx.save();
    ctx.translate(item.x, item.y);
    ctx.shadowBlur = Math.sin(Date.now() / 200) * 5 + 15;
    ctx.shadowColor = '#FF69B4';
    ctx.fillStyle = '#FF69B4';
    ctx.beginPath();
    ctx.moveTo(0, 8);
    ctx.bezierCurveTo(-25, -10, -30, -35, 0, -30);
    ctx.bezierCurveTo(30, -35, 25, -10, 0, 8);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawKissItem(item) {
    ctx.save();
    ctx.translate(item.x, item.y);
    ctx.rotate(Math.sin(Date.now() / 300) * 0.2);
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#FF1493';
    
    // 裁剪成圆形
    ctx.beginPath();
    ctx.arc(0, 0, item.width / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    
    ctx.drawImage(kissImg, -item.width / 2, -item.height / 2, item.width, item.height);
    ctx.shadowBlur = 0;
    ctx.restore();
}

function spawnLoveHearts() {
    var colors = ['#FF69B4', '#FF1493', '#FF6EB4', '#FFB6C1', '#DC143C', '#FFA07A'];
    for (var i = 0; i < 6; i++) {
        loveHearts.push({
            x: Math.random() * canvas.width,
            y: canvas.height + 20,
            vx: (Math.random() - 0.5) * 2,
            vy: -(Math.random() * 3 + 2),
            size: Math.random() * 20 + 10,
            alpha: 0.6 + Math.random() * 0.4,
            color: colors[Math.floor(Math.random() * colors.length)]
        });
    }
    loveEffectActive = true;
}

function drawLoveEffect() {
    if (!loveEffectActive) return;
    loveHearts = loveHearts.filter(function(h) { return h.alpha > 0; });
    loveHearts.forEach(function(h) {
        ctx.save();
        ctx.translate(h.x, h.y);
        ctx.globalAlpha = h.alpha;
        ctx.fillStyle = h.color;
        ctx.beginPath();
        ctx.moveTo(0, h.size * 0.4);
        ctx.bezierCurveTo(-h.size * 0.8, -h.size * 0.2, -h.size * 0.8, -h.size * 0.7, 0, -h.size * 0.5);
        ctx.bezierCurveTo(h.size * 0.8, -h.size * 0.7, h.size * 0.8, -h.size * 0.2, 0, h.size * 0.4);
        ctx.fill();
        ctx.restore();
        h.x += h.vx;
        h.y += h.vy;
        h.vy -= 0.02;
        h.alpha -= 0.005;
    });
}

function drawThorn(thorn) {
    ctx.fillStyle = '#2d5016';
    ctx.strokeStyle = '#1a3009';
    ctx.lineWidth = 2;
    ctx.fillRect(thorn.x, thorn.y, thorn.width, thorn.height);
    ctx.strokeRect(thorn.x, thorn.y, thorn.width, thorn.height);
    ctx.fillStyle = '#3a6b1e';
    var sc = 5, sp = thorn.height / sc;
    for (var i = 0; i < sc; i++) {
        var sy = thorn.y + i * sp + sp / 2;
        ctx.beginPath();
        ctx.moveTo(thorn.x, sy);
        ctx.lineTo(thorn.x - 10, sy - 5);
        ctx.lineTo(thorn.x - 10, sy + 5);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(thorn.x + thorn.width, sy);
        ctx.lineTo(thorn.x + thorn.width + 10, sy - 5);
        ctx.lineTo(thorn.x + thorn.width + 10, sy + 5);
        ctx.closePath();
        ctx.fill();
    }
}

function generateThorn() {
    var gap = 280, minH = 80, maxH = canvas.height - gap - minH;
    var height = Math.random() * (maxH - minH) + minH;
    var gapMiddle = height + gap / 2;
    
    // 爱心道具：70%概率生成
    if (Math.random() < 0.7) {
        loveItems.push({ x: canvas.width, y: gapMiddle, width: 50, height: 50 });
    }
    
    // 亲亲道具：70%概率生成，但位置与爱心错开
    if (Math.random() < 0.7) {
        // 在荆棘间隙的上下1/3和2/3位置随机选择一个，避免与爱心重合
        var offset = Math.random() < 0.5 ? -gap / 3 : gap / 3;
        var kissY = gapMiddle + offset;
        // 确保不会超出边界
        kissY = Math.max(height + 30, Math.min(kissY, height + gap - 30));
        kissItems.push({ x: canvas.width + 100, y: kissY, width: 40, height: 40 }); // x也错开一些
    }
    
    thorns.push({ x: canvas.width, y: 0, width: 60, height: height });
    thorns.push({ x: canvas.width, y: height + gap, width: 60, height: canvas.height - height - gap });
}

function checkCollision(a, b) {
    return a.x - a.width / 2 < b.x + b.width && a.x + a.width / 2 > b.x && a.y - a.height / 2 < b.y + b.height && a.y + a.height / 2 > b.y;
}

function update() {
    if (gameState !== 'playing') return;
    var elapsed = Date.now() - startTime;

    TIMED_MESSAGES.forEach(function(msg, idx) {
        if (!shownMessages[idx] && elapsed >= msg.time) {
            shownMessages[idx] = true;
            showTimedMessage(msg.text);
            playMessageSound();
        }
    });

    if (Math.random() < 0.03) spawnLoveHearts();

    angel.velocity += angel.gravity;
    angel.y += angel.velocity;
    if (angel.y < 0 || angel.y > canvas.height) { endGame(); return; }

    scoreEl.textContent = Math.floor(elapsed / 1000) + '秒';

    if (Date.now() - lastThornTime > thornInterval) {
        generateThorn();
        lastThornTime = Date.now();
    }

    for (var i = thorns.length - 1; i >= 0; i--) {
        thorns[i].x -= thornSpeed;
        if (checkCollision(angel, thorns[i])) { endGame(); return; }
        if (thorns[i].x + thorns[i].width < 0) thorns.splice(i, 1);
    }

    for (var i = loveItems.length - 1; i >= 0; i--) {
        loveItems[i].x -= 2;
        if (checkCollision(angel, loveItems[i])) {
            loveCount++;
            loveCounterSpan.textContent = loveCount;
            spawnLoveHearts();
            playLoveSound();
            loveItems.splice(i, 1);
            continue;
        }
        if (loveItems[i].x + loveItems[i].width < 0) loveItems.splice(i, 1);
    }

    for (var i = kissItems.length - 1; i >= 0; i--) {
        kissItems[i].x -= 2;
        if (checkCollision(angel, kissItems[i])) {
            kissCount++;
            kissCounterSpan.textContent = kissCount;
            // 移除弹窗：不再显示"你被亲了！"
            playKissSound();
            kissItems.splice(i, 1);
            continue;
        }
        if (kissItems[i].x + kissItems[i].width < 0) kissItems.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (var i = 0; i < 3; i++) {
        var x = (Date.now() / 50 + i * 200) % (canvas.width + 100) - 50;
        var y = 50 + i * 100;
        ctx.beginPath();
        ctx.arc(x, y, 30, 0, Math.PI * 2);
        ctx.arc(x + 25, y, 40, 0, Math.PI * 2);
        ctx.arc(x + 50, y, 30, 0, Math.PI * 2);
        ctx.fill();
    }
    drawLoveEffect();
    thorns.forEach(function(t) { drawThorn(t); });
    loveItems.forEach(function(it) { drawLoveItem(it); });
    kissItems.forEach(function(it) { drawKissItem(it); });
    drawAngel();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

function startCountdown() {
    gameState = 'countdown';
    countdownEl.style.display = 'block';
    var c = 3;
    countdownEl.textContent = c;
    var iv = setInterval(function() {
        c--;
        if (c > 0) {
            countdownEl.textContent = c;
        } else {
            clearInterval(iv);
            countdownEl.style.display = 'none';
            startTime = Date.now();
            gameState = 'playing';
            resetShownMessages();
            timedMsgEl.style.display = 'none';
            kissMsgEl.style.display = 'none';
        }
    }, 1000);
}

function startGame() {
    initAudio();
    gameState = 'countdown';
    angel.y = canvas.height / 2;
    angel.velocity = 0;
    thorns = [];
    loveItems = [];
    kissItems = [];
    loveHearts = [];
    lastThornTime = Date.now();
    loveEffectActive = false;
    loveCount = 0;
    kissCount = 0;
    loveCounterSpan.textContent = loveCount;
    kissCounterSpan.textContent = kissCount;
    timedMsgEl.style.display = 'none';
    kissMsgEl.style.display = 'none';
    gameOverEl.style.display = 'none';
    startScreen.style.display = 'none';
    startCountdown();
}

function endGame() {
    gameState = 'over';
    playHitSound();
    var elSec = Math.floor((Date.now() - startTime) / 1000);
    finalTimeEl.textContent = '坚持惹：' + elSec + '秒';
    if (elSec > bestTime) {
        bestTime = elSec;
        localStorage.setItem('angelBestTime', bestTime);
    }
    bestTimeEl.textContent = '最高成绩：' + bestTime + '秒';
    gameOverEl.style.display = 'block';
    loveEffectActive = false;
    loveHearts = [];
    timedMsgEl.style.display = 'none';
    kissMsgEl.style.display = 'none';
}

function jump() { 
    if (gameState !== 'playing') return; 
    angel.velocity = angel.jump; 
    playJumpSound();
}

canvas.addEventListener('click', function() {
    if (gameState === 'playing') jump();
    else if (gameState === 'over') startGame();
});
canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (gameState === 'playing') jump();
    else if (gameState === 'over') startGame();
});
startBtn.addEventListener('click', function(e) { e.stopPropagation(); startGame(); });
restartBtn.addEventListener('click', function(e) { e.stopPropagation(); startGame(); });
document.addEventListener('keydown', function(e) { if (e.code === 'Space' && gameState === 'playing') jump(); });

gameLoop();
</script>
</body>
</html>
